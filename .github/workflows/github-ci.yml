name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ make

    - name: Run build.sh
      run: |
        chmod +x cicd/build.sh
        ./cicd/build.sh

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        path: |
          usr/bin/bubblesort
          src/bubblesort
        retention-days: 1

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ make

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-output
        path: .

    - name: Run test.sh
      run: |
        chmod +x cicd/test.sh
        ./cicd/test.sh

  packaging:
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ make dpkg-dev

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-output
        path: .

    - name: Run packaging.sh
      run: |
        chmod +x cicd/packaging.sh
        ./cicd/packaging.sh trrspo_1.0-1_amd64.deb

    - name: Upload Debian package
      uses: actions/upload-artifact@v4
      with:
        name: trrspo-package
        path: pkg/trrspo_1.0-1_amd64.deb
        retention-days: 30
  deploy:
    runs-on: ubuntu-latest
    needs: packaging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download Debian package
      uses: actions/download-artifact@v4
      with:
        name: trrspo-package
        path: pkg

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: cicd/Dockerfile
        push: false
        load: true
        tags: trrspo:latest

    - name: Test Docker container
      run: |
        echo "5\n1 5 3 2 4" | docker run --rm trrspo:latest

    - name: Push Docker image
      run: |
        docker tag trrspo:latest ${{ secrets.DOCKERHUB_USERNAME }}/trrspo:latest
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/trrspo:latest
